spring:
  application:
    name: tinyurl
  messages:
    basename: i18n/messages
    encoding: UTF-8
    cache-duration: 3600
  datasource:
    url: jdbc:sqlite:./data/iamryan.db?journal_mode=WAL&synchronous=NORMAL&busy_timeout=5000
    username:
    password:
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 30000
      login-timeout: 5
      connection-timeout: 60000
      max-lifetime: 70000
      read-only: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true
    open-in-view: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8765

tinyurl:
  prefix: https://s.imryan.dev/
  expireSeconds: 604800

radio-info:
  fetch:
    initial-delay-ms: 60000
    fixed-rate-ms: 21600000
