name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build jar
        run: mvn -DskipTests clean package

      - name: Upload jar
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          port: ${{ secrets.GCP_VM_PORT }}
          source: target/iamryan-api-0.0.1-SNAPSHOT.jar
          target: /tmp/iamryan-api-deploy

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          port: ${{ secrets.GCP_VM_PORT }}
          script: |
            sudo install -o iamryan -g iamryan -m 0644 /tmp/iamryan-api-deploy/target/iamryan-api-0.0.1-SNAPSHOT.jar /opt/iamryan-api/iamryan-api.jar
            sudo mkdir -p /opt/iamryan-api/data
            sudo chown -R iamryan:iamryan /opt/iamryan-api
            sudo systemctl restart iamryan-api
            sudo systemctl status iamryan-api --no-pager